<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ผิวคุณเหมาะกับ Skin Booster ตัวไหน? | TWC Skin Match</title>
<meta name="description" content="ตอบคำถามสั้น ๆ เพื่อดู Skin Booster ที่ตรงกับปัญหาผิว พร้อมราคาโปรโมชั่นจากทวีชัยคลินิก">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --twc-orange:#E8781E;
    --twc-orange-deep:#C05415;
    --twc-pink:#E07A9A;
    --twc-peach:#FFF3E9;
    --twc-cream:#FFFDFB;
    --twc-ink:#2E2A27;
    --twc-body:#4A443F;   
    --twc-gray:#6E655E;   
    --twc-line:#EDE0D8;
    --twc-line-soft:#F3E9E2;
    --shadow-soft: 0 10px 30px -14px rgba(80,50,30,0.18);
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; }
  body{
    margin:0; font-family:'Prompt',sans-serif; color:var(--twc-ink);
    background:var(--twc-cream); overflow-x:hidden; -webkit-tap-highlight-color:transparent;
    font-size:16px; line-height:1.7;
  }
  .app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .clinic-header{
    display:flex; align-items:center; gap:12px;
    padding:18px 22px 12px 22px; border-bottom:1px solid var(--twc-line-soft);
  }
  .clinic-logo{ height:40px; width:40px; object-fit:contain; flex-shrink:0; border-radius:8px; }
  .clinic-name{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:16px; line-height:1.3; }
  .clinic-subtitle{ font-size:12px; color:var(--twc-orange-deep); margin-top:1px; }

  .qprogress{ display:none; padding:12px 22px 0 22px; }
  .qprogress .label{ font-size:13px; color:var(--twc-orange-deep); font-weight:600; margin-bottom:6px; }
  .qprogress .bar{ height:5px; border-radius:3px; background:var(--twc-line-soft); overflow:hidden; }
  .qprogress .fill{ height:100%; background:var(--twc-orange); border-radius:3px; transition:width .3s ease; }

  .stage{ flex:1; display:flex; align-items:flex-start; justify-content:center; padding:20px 20px 110px 20px; }

  .card{
    width:100%; background:#fff; border:1px solid var(--twc-line-soft);
    border-radius:20px; box-shadow:var(--shadow-soft);
    padding:28px 22px 26px 22px; animation:rise .3s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .card{animation:none;} }

  .eyebrow{ font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--twc-orange-deep); font-weight:600; margin-bottom:8px; }
  h1.title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:25px; line-height:1.45; margin:0 0 12px 0; outline:none; }
  h1.title.q{ font-size:20px; }
  h2.sec-title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:18px; line-height:1.5; margin:0 0 8px 0; outline:none; }
  p.body-text{ font-size:16px; line-height:1.75; color:var(--twc-body); margin:0 0 16px 0; }
  .small-line{ font-size:13.5px; color:var(--twc-gray); margin:-6px 0 18px 0; }

  .btn{
    display:block; width:100%; text-align:center; border:none; cursor:pointer;
    font-family:'Prompt',sans-serif; font-weight:600; font-size:16px;
    padding:16px 18px; border-radius:14px; min-height:52px;
    transition:transform .12s ease, opacity .2s ease;
  }
  .btn:active{ transform:scale(.98); }
  .btn[disabled]{ opacity:.4; pointer-events:none; }
  .btn-primary{ background:var(--twc-orange-deep); color:#fff; margin-bottom:10px; box-shadow:0 8px 18px -8px rgba(192,84,21,.45); font-size:17px; letter-spacing:0.5px;}
  .btn-outline{ background:#fff; color:var(--twc-orange-deep); border:1.5px solid var(--twc-orange-deep); margin-bottom:10px; }
  .btn-ghostlink{ background:none; border:none; color:var(--twc-gray); font-size:14px; text-decoration:underline; padding:10px; width:100%; font-family:'Prompt',sans-serif; cursor:pointer; }
  .micro-note{ font-size:13px; color:var(--twc-gray); text-align:center; line-height:1.6; margin-top:2px; }

  .trust-strip{ font-size:12.5px; color:var(--twc-gray); line-height:1.7; margin:14px 0 0 0; padding-top:12px; border-top:1px solid var(--twc-line-soft); }

  .options{ display:flex; flex-direction:column; gap:9px; margin-top:14px; }
  .opt{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:15px 16px; border-radius:13px; border:1.5px solid var(--twc-line); background:#fff;
    font-size:15.5px; text-align:left; cursor:pointer; font-family:'Prompt',sans-serif;
    color:var(--twc-ink); width:100%; line-height:1.55; min-height:52px;
    transition:border-color .15s ease, background .15s ease, opacity .15s ease;
  }
  .opt:active{ background:var(--twc-peach); }
  .opt .arrow{ color:var(--twc-orange); font-size:16px; opacity:.6; flex-shrink:0; }
  .opt.flag{ border-color:#E8C9BE; }
  .opt.selected{ border-color:var(--twc-orange-deep); background:var(--twc-peach); font-weight:500; }
  .opt.dim{ opacity:.45; }
  .tick{
    width:22px; height:22px; border-radius:7px; flex-shrink:0;
    border:1.5px solid var(--twc-line); display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#fff;
  }
  .opt.selected .tick, .consent-box.checked .tick{ background:var(--twc-orange-deep); border-color:var(--twc-orange-deep); }
  .counter{ font-size:13px; color:var(--twc-orange-deep); font-weight:500; text-align:right; margin-top:8px; }

  .back-row{
    display:flex; align-items:center; gap:6px; margin-bottom:14px; font-size:13.5px; color:var(--twc-gray);
    cursor:pointer; background:none; border:none; font-family:'Prompt',sans-serif; padding:4px 0;
  }

  /* analysis moment */
  .analysis{ text-align:center; padding:46px 10px; }
  .analysis .spin{
    width:38px; height:38px; border-radius:50%; margin:0 auto 18px auto;
    border:3px solid var(--twc-line-soft); border-top-color:var(--twc-orange-deep); animation:sp 1s linear infinite;
  }
  @keyframes sp{ to{ transform:rotate(360deg);} }
  .analysis .step{ font-size:15.5px; color:var(--twc-body); min-height:26px; }

  /* result */
  .result-badge{
    display:inline-block; padding:6px 14px; border-radius:20px; background:var(--twc-orange-deep);
    color:#fff; font-size:13px; font-weight:600; margin-bottom:12px; letter-spacing: 0.5px;
  }
  .profile-title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:22px; line-height:1.4; margin:0 0 12px 0; color:var(--twc-ink); }
  .clinical-note{ font-size:15px; color:var(--twc-body); line-height:1.8; margin:0 0 12px 0; padding-left:12px; border-left:3px solid var(--twc-line); }
  .divider{ height:1px; background:var(--twc-line-soft); margin:20px 0; border:none; }
  .sec-head{ font-size:15px; font-weight:700; color:var(--twc-ink); margin:0 0 12px 0; }

  /* Primary Card Redesign */
  .prog-card{ border:2px solid var(--twc-orange-deep); border-radius:18px; padding:20px 16px; margin-bottom:16px; background:linear-gradient(to bottom, #fff, #fffdfa); box-shadow:0 8px 25px rgba(232,120,30,0.12); }
  .prog-img-wrap{
    width:100%; height:160px; border-radius:12px; background:#fff; border:1px solid var(--twc-line-soft);
    display:flex; align-items:center; justify-content:center; margin-bottom:14px; overflow:hidden;
  }
  .prog-img-wrap img{ max-width:85%; max-height:85%; object-fit:contain; }
  .prog-name{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:26px; text-align:center; color:var(--twc-orange-deep); line-height:1.2; margin:0 0 4px 0; }
  .prog-cat{ display:block; font-size:12px; color:#fff; background:var(--twc-orange-deep); padding:4px 12px; border-radius:12px; font-weight:600; margin:0 auto 14px auto; width:fit-content; }
  .benefit-line{ font-size:15.5px; font-weight:600; color:var(--twc-orange-deep); text-align:center; padding:10px; background:var(--twc-peach); border:1px dashed var(--twc-orange); border-radius:10px; margin:12px 0; line-height: 1.5;}
  
  .why-list{ margin:8px 0 0 0; padding:0; list-style:none; }
  .why-list li{ font-size:14.5px; color:var(--twc-body); line-height:1.6; margin-bottom:10px; display:flex; gap:8px; align-items:flex-start; }
  .why-list li b{ color:var(--twc-ink); font-weight:600; }

  /* Price Area Redesign */
  .price-area{ margin-top:16px; padding:16px; border-radius:14px; background:#fffaf6; border:2px solid #f2d1b3; text-align:center; }
  .promo-line{ display:flex; align-items:baseline; justify-content:center; gap:8px; margin:4px 0; }
  .promo-big{ font-family:'Prompt',sans-serif; font-weight:700; font-size:28px; color:#d9381e; line-height:1.2; }
  .price-full-strike{ font-size:14px; color:var(--twc-gray); margin-top:2px; }
  .price-full-strike s, .strike-sm s{ color:#a0968e; }
  .price-tag-trust { font-size:13px; color:#3E6B48; background:#F1F7F2; border-radius:20px; padding:5px 12px; display:inline-block; margin-top:8px; font-weight:500;}

  /* Upsell/Downsell Cards */
  .upsell-card{ background:linear-gradient(145deg, #fff, #fff6ec); border:2px solid #f2d1b3; box-shadow:0 6px 20px rgba(232,120,30,0.1); border-radius:16px; padding:16px; margin-top:16px; position:relative; overflow:hidden; }
  .upsell-badge { position:absolute; top:0; right:0; background:var(--twc-orange-deep); color:#fff; font-size:11px; font-weight:700; padding:4px 12px; border-bottom-left-radius:12px; letter-spacing: 0.5px;}
  .upsell-card .u-head{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:17px; color:var(--twc-orange-deep); display:flex; align-items:center; gap:6px; margin-bottom:4px;}
  .upsell-card .u-body{ font-size:15px; color:var(--twc-ink); font-weight:600; line-height:1.5; }
  .upsell-card .u-desc{ font-size:14px; color:var(--twc-body); margin-top:6px; line-height:1.6; }

  /* Alternative Cards */
  .alt-card{ border:1px solid #e8781e; background:#fff; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow:0 4px 12px rgba(232,120,30,0.06); display:flex; flex-direction:column; gap:12px;}
  .alt-main-row { display:flex; gap:14px; align-items:flex-start; width: 100%;}
  .alt-card .sec-thumb{ width:80px; height:80px; flex-shrink:0; border-radius:12px; background:#fff; border:1px solid var(--twc-line-soft); display:flex; align-items:center; justify-content:center; overflow:hidden; padding:4px;}
  .alt-card .sec-thumb img{ max-width:100%; max-height:100%; object-fit:contain; }
  .alt-info { flex:1; }
  .alt-card .n{ font-family:'Prompt',sans-serif; font-weight:700; font-size:18px; color:var(--twc-orange-deep); margin-bottom:4px;}
  .alt-problem{ font-size:13.5px; color:var(--twc-ink); font-weight:600; line-height:1.4; display:flex; align-items:flex-start; gap:4px;}
  .alt-card .f{ font-size:14px; color:var(--twc-body); background:var(--twc-peach); padding:8px 10px; border-radius:8px; border:1px dashed #F0DCC8; line-height: 1.5;}
  .alt-card .p{ font-size:15px; color:#d9381e; font-weight:700; margin-top:4px;}
  .strike-sm{ font-size:13px; font-weight:400; color:var(--twc-gray); margin-left:6px; }
  .alt-actions{ display:flex; gap:8px; margin-top:4px; width: 100%;}
  .alt-actions .btn{ flex:1; margin-top:0; padding:12px 8px; font-size:13.5px; margin-bottom: 0;}

  /* Details Panel & Others */
  .hidden-alts{ display:none; } .hidden-alts.open{ display:block; }
  .details-panel{ display:none; margin-top:12px; } .details-panel.open{ display:block; }
  .toggle-line{ width:100%; background:#fffaf6; border:1px solid rgba(232,120,30,0.28); color:var(--twc-orange-deep); border-radius:14px; padding:14px; font-family:'Prompt',sans-serif; font-weight:600; font-size:15px; margin-top:16px; cursor:pointer; transition: background 0.2s;}
  .toggle-line:active { background: var(--twc-peach); }
  
  .doctor-block{ display:flex; gap:14px; align-items:center; border:1.5px solid var(--twc-line); border-radius:16px; padding:14px; margin:14px 0; background:#fff; }
  .doctor-ph{ width:64px; height:64px; border-radius:50%; background:var(--twc-peach); border:1px solid var(--twc-line-soft); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--twc-gray); text-align:center; overflow:hidden; }
  .doctor-ph img{ width:100%; height:100%; object-fit:cover; }
  .doctor-info .n{ font-weight:600; font-size:15px; }
  .doctor-info .d{ font-size:12.5px; color:var(--twc-gray); line-height:1.6; }
  
  .faq{ margin:8px 0; }
  .faq-item{ border:1px solid var(--twc-line-soft); border-radius:12px; margin-bottom:8px; overflow:hidden; }
  .faq-q{ width:100%; background:#fff; border:none; font-family:'Prompt',sans-serif; font-size:14.5px; font-weight:500; color:var(--twc-ink); padding:13px 14px; text-align:left; display:flex; justify-content:space-between; gap:8px; cursor:pointer; }
  .faq-a{ display:none; font-size:13.5px; color:var(--twc-body); line-height:1.7; padding:0 14px 13px 14px; }
  .faq-a.open{ display:block; }

  .caution-note{ font-size:13.5px; color:#8A5A2A; line-height:1.75; padding:13px 15px; background:#FFF6EC; border:1px solid #F0DCC0; border-radius:13px; margin:14px 0 4px 0; }
  .comeback-note{ font-size:13.5px; color:var(--twc-orange-deep); line-height:1.7; padding:12px 14px; border:1px dashed #F0D9C4; border-radius:13px; margin:12px 0 4px 0; background:#FFFCF8; font-weight: 500;}
  .doctor-note{ font-size:13.5px; color:var(--twc-body); line-height:1.75; padding:13px 15px; background:var(--twc-peach); border-radius:13px; margin:14px 0 6px 0; }
  .disclaimer{ font-size:12px; color:var(--twc-gray); line-height:1.7; margin-top:20px; text-align:center; padding: 10px; border-top: 1px solid var(--twc-line-soft);}
  .reentry{ font-size:13px; color:var(--twc-gray); text-align:center; line-height:1.7; margin-top:8px; }

  .branch-chips{ display:flex; flex-wrap:wrap; gap:8px; margin:6px 0 14px 0; }
  .bchip{ font-family:'Prompt',sans-serif; font-size:14px; border-radius:20px; border:1.5px solid var(--twc-line); background:#fff; color:var(--twc-body); padding:10px 14px; cursor:pointer; min-height:44px; transition: all 0.2s;}
  .bchip.sel{ border-color:var(--twc-orange-deep); background:var(--twc-orange-deep); color:#fff; font-weight:600; box-shadow: 0 4px 10px rgba(232,120,30,0.2);}
  .handoff-line{ font-size:13.5px; color:var(--twc-ink); line-height:1.7; margin:10px 0; font-weight: 500;}

  /* sticky CTA */
  .sticky-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:40; display:none;
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)) 16px;
    background:rgba(255,253,251,.96); border-top:1px solid var(--twc-line-soft); backdrop-filter:blur(6px);
  }
  .sticky-bar.show{ display:block; }
  .sticky-inner{ max-width:480px; margin:0 auto; }
  .sticky-bar .btn{ margin-bottom:0; font-size: 17px; }

  /* modal */
  .m-overlay{ position:fixed; inset:0; background:rgba(46,42,39,.6); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
  .m-sheet{ width:100%; max-width:480px; max-height:86vh; overflow-y:auto; background:#fff; border-radius:24px 24px 0 0; padding:24px 20px calc(20px + env(safe-area-inset-bottom)) 20px; }
  .m-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px; }
  .m-close{ background:var(--twc-peach); border:none; border-radius:12px; width:40px; height:40px; font-size:18px; color:var(--twc-orange-deep); cursor:pointer; flex-shrink:0; font-weight: bold;}
  .m-title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:20px; line-height:1.4; color: var(--twc-ink);}
  .branch-sheet .bchip{ display:block; width:100%; text-align:left; margin-top:10px; font-size: 15px;}

  button:focus-visible, .opt:focus-visible, .bchip:focus-visible, .b-btn:focus-visible{
    outline:2.5px solid var(--twc-orange-deep); outline-offset:2px;
  }
  ::selection{ background:var(--twc-peach); }
  
  /* Tables */
  table.cmp{ width:100%; border-collapse:collapse; font-size:13px; margin-top: 12px;}
  table.cmp th, table.cmp td{ border:1px solid var(--twc-line-soft); padding:10px; vertical-align:top; line-height:1.5; text-align:left; }
  table.cmp th{ background:var(--twc-peach); color:var(--twc-ink); font-weight:600; font-size:13.5px; }
  table.cmp td.crit{ background:var(--twc-cream); color:var(--twc-gray); font-weight:600; width:90px; }
  
  /* Timeline inside details */
  .timeline{ margin-top:16px; padding: 14px; background: #fafafa; border-radius: 12px; border: 1px solid var(--twc-line-soft);}
  .expect-block{ margin-top:16px; background:#fff; border:1px solid var(--twc-orange); border-radius:12px; padding:14px; }

  /* compat: rules still rendered by JS (timeline / learn-modal / compare) */
  .tl-rail{ display:flex; flex-direction:column; align-items:center; width:16px; flex-shrink:0; }
  .tl-item{ display:flex; gap:12px; }
  .tl-dot{ width:10px; height:10px; border-radius:50%; background:var(--twc-orange); margin-top:5px; flex-shrink:0; }
  .tl-line{ width:2px; flex:1; background:var(--twc-line); }
  .tl-stage{ font-size:13px; font-weight:600; color:var(--twc-ink); }
  .tl-text{ font-size:13.5px; color:var(--twc-body); line-height:1.65; }
  .tl-note{ font-size:12px; color:var(--twc-gray); margin-top:2px; }
  .tl-body{ padding-bottom:14px; }
  .b-rows{ margin-top:10px; }
  .b-row{ font-size:13px; color:var(--twc-body); line-height:1.65; margin-bottom:4px; }
  .b-row b{ color:var(--twc-ink); font-weight:600; }
  .b-row.neg b{ color:#8A5A2A; }
  .b-price{ font-size:13px; color:var(--twc-orange-deep); font-weight:600; margin-top:8px; }
  .b-price span{ color:var(--twc-gray); font-weight:400; font-size:12px; }
  .cmp-intro{ font-size:13.5px; color:var(--twc-body); line-height:1.7; padding:4px 4px 10px 4px; }
  .cmp-cta{ margin-top:10px; }
</style>

<body>

const state = { step:'welcome', qIndex:0, answers:{}, consent:false, branch:null, result:null };

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function focusTitle(){ var el=document.getElementById('focusAnchor'); if(el){ el.setAttribute('tabindex','-1'); el.focus({preventScroll:false}); } }
function setProgress(n,total){
  var box=document.getElementById('qprog');

  total=total||6;
  box.style.display='block';
  document.getElementById('qprogLabel').textContent='ข้อ '+n+'/'+total;
  document.getElementById('qprogFill').style.width=Math.round(n/total*100)+'%';
}
function showSticky(on, label){
  var bar=document.getElementById('stickyBar');
  if(label) document.getElementById('stickyBtn').textContent=label;
  bar.classList.toggle('show', !!on);
}

/* ---------- questions ---------- */
function visibleQNumber(){
  var skipped = scoreableConcerns().length<2 ? 1 : 0;
  if(state.qIndex===0) return { n:1, total:6 };
  return { n: state.qIndex+1-skipped, total: 6-skipped };
}
function scoreableConcerns(){
  var sel = state.answers.concern||[];
  return sel.filter(function(i){ return !CONCERNS[i].unsure; });
}
function showQuestion(){
  var q = QUESTIONS[state.qIndex];
  if(q.type==='priority'){
    var sc = scoreableConcerns();
    if(sc.length<2){ state.answers.priority = (sc.length===1? sc[0] : null); nextQuestion(true); return; }
  }
  var vq=visibleQNumber(); setProgress(vq.n, vq.total); showSticky(false);
  var back = '<button class="back-row" onclick="goBack()">‹ ย้อนกลับ</button>';
  var html = '<div class="card">'+back+'<h1 class="title q" id="focusAnchor">'+q.title+'</h1>';

  if(q.type==='multi'){
    var sel = state.answers[q.id]||[];
    html += '<div class="small-line" style="margin-top:-4px;">'+(q.sub||'')+'</div><div class="options">'
      + q.options.map(function(o,i){
          var isSel = sel.indexOf(i)>=0;
          var dim = (!isSel && sel.length>=q.max)?' dim':'';
          return '<button class="opt'+(isSel?' selected':'')+dim+'" onclick="toggleMulti('+i+')">'
            +'<span>'+esc(o.t)+'</span><span class="tick">'+(isSel?'✓':'')+'</span></button>';
        }).join('')
      +'</div><div class="counter">เลือกแล้ว '+sel.length+'/'+q.max+'</div>'
      +'<button class="btn btn-primary" style="margin-top:12px;" '+(sel.length?'':'disabled ')+'onclick="nextQuestion()">ต่อไป</button>';
  }
  else if(q.type==='priority'){
    var picks = scoreableConcerns();
    html += '<div class="options">'
      + picks.map(function(ci){
          return '<button class="opt" onclick="pickPriority('+ci+')"><span>'+esc(CONCERNS[ci].t)+'</span><span class="arrow">›</span></button>';
        }).join('') + '</div>';
  }
  else {
    html += '<div class="options">'
      + q.options.map(function(o,i){
          return '<button class="opt'+(o.hard?' flag':'')+'" onclick="pickSingle('+i+', this)">'
            +'<span>'+esc(o.t)+'</span><span class="arrow">›</span></button>';
        }).join('') + '</div>';
    if(q.last){ html += '<button class="btn btn-primary" id="lastBtn" style="margin-top:12px;" disabled onclick="runAnalysis()">ดูผลของฉัน</button>'; }
  }
  html += '</div>';
  stage.innerHTML = html; focusTitle();
}

function toggleMulti(i){
  var q=QUESTIONS[state.qIndex];
  var sel=state.answers[q.id]||[];
  if(sel.indexOf(i)>=0) sel=sel.filter(function(x){return x!==i;});
  else if(sel.length<q.max) sel=sel.concat([i]);
  state.answers[q.id]=sel;
  showQuestion();
}
function pickSingle(i, el){
  var q=QUESTIONS[state.qIndex];
  state.answers[q.id]=i;
  track('question_complete', basePayload({q:q.id}));
  if(el){ el.classList.add('selected'); }
  if(q.last){
    var b=document.getElementById('lastBtn'); if(b) b.disabled=false;
    var opts=el?el.parentNode.querySelectorAll('.opt'):[];
    for(var k=0;k<opts.length;k++){ if(opts[k]!==el) opts[k].classList.remove('selected'); }
    return;
  }
  setTimeout(nextQuestion, 250);
}
function pickPriority(ci){
  state.answers.priority=ci; track('question_complete', basePayload({q:'priority'}));
  setTimeout(nextQuestion, 200);
}
function nextQuestion(skippedSilently){
  if(!skippedSilently){ var q=QUESTIONS[state.qIndex]; if(q && q.type==='multi') track('question_complete', basePayload({q:q.id})); }
  if(state.qIndex < QUESTIONS.length-1){ state.qIndex++; showQuestion(); }
  else { runAnalysis(); }
}
function goBack(){
  if(state.qIndex===0){ showWelcome(); return; }
  state.qIndex--;
  /* if stepping back onto a skipped priority screen, keep stepping */
  var q=QUESTIONS[state.qIndex];
  if(q.type==='priority' && scoreableConcerns().length<2){ state.qIndex--; }
  if(state.qIndex<0){ showWelcome(); return; }
  showQuestion();
}

/* ---------- analysis moment (honest labor illusion) ---------- */
function runAnalysis(){
  track('quiz_complete', basePayload()); setProgress(null);
  stage.innerHTML = '<div class="card analysis"><div class="spin" aria-hidden="true"></div><div class="step" id="anStep" role="status">กำลังจับคู่กับตัวเลือกที่เหมาะกับผิวคุณ...</div></div>';
  setTimeout(function(){ state.result = calculateResult(); renderResult(); }, 750);
}

   ENGINE — skin-fit scoring
   priority answer ได้น้ำหนักซ้ำอีกหนึ่งรอบ (ตัวคูณความสำคัญ)
   doctorOnly เฉพาะ hard flag · คะแนนกระจาย (top ≤2) → soft doctorOnly
   อายุ <30 ลดน้ำหนักกลุ่มพรีเมียม
   ========================================================= */
function calculateResult(){
  var score={neo:0,nctf:0,vitaran:0,rejuran:0,nucleofill:0,plinest:0,profhilo:0};
  var hard=false, caution=false, emphasis=false, isOld=false, ageIdx=null, budget=false, statusTag='';
  var selConcerns = state.answers.concern||[];
  var prio = state.answers.priority;

  selConcerns.forEach(function(ci){
    var c=CONCERNS[ci];
    Object.keys(c.w||{}).forEach(function(k){ score[k]+=c.w[k]; });
    if(c.sens) caution=true;
    if(c.unsure) emphasis=true;
  });
  if(prio!==null && prio!==undefined && CONCERNS[prio]){
    Object.keys(CONCERNS[prio].w||{}).forEach(function(k){ score[k]+=CONCERNS[prio].w[k]; });
  }
  ['age','start','health','status'].forEach(function(qid){
    var q=QUESTIONS.filter(function(x){return x.id===qid;})[0];
    var a=state.answers[qid]; if(a===undefined) return;
    var o=q.options[a];
    Object.keys(o.w||{}).forEach(function(k){ score[k]+=o.w[k]; });
    if(o.hard) hard=true;
    if(o.caution) caution=true;
    if(o.emphasis) emphasis=true;
    if(o.budget) budget=true;
    if(o.tag){ statusTag=o.tag; if(o.tag==='OLD') isOld=true; }
    if(o.age!==undefined) ageIdx=o.age;
  });

  if(hard) return { type:'doctorOnly', soft:false, isOld:isOld, statusTag:statusTag };

  if(ageIdx===0){ ['nucleofill','plinest','profhilo'].forEach(function(k){ score[k]=Math.max(0,score[k]-2); }); }

  /* Two-layer ranking: 1) skin-fit score  2) commercial priority as tie-breaker only */
  var order=['vitaran','rejuran','nctf','profhilo','nucleofill','plinest','neo'];
  var CP=CONFIG.COMMERCIAL, TT=(CP&&CP.TIE_THRESHOLD)||0;
  function crank(k){ var c=(CP&&CP.products&&CP.products[k])||{}; var h=(c.heroTier!=null?c.heroTier:9), p=(c.conversionPriority!=null?c.conversionPriority:99); return h*100+p; }
  var pool=order.filter(function(k){ var c=CP&&CP.products&&CP.products[k]; return !c || c.enabled!==false; });
  var ranked=pool.slice().sort(function(a,b){
    var d=score[b]-score[a];
    if(Math.abs(d)<=TT) return crank(a)-crank(b);
    return d;
  });
  var primary=ranked[0];
  if(score[primary]<=2) return { type:'doctorOnly', soft:true, isOld:isOld, caution:caution, statusTag:statusTag };

  var runnerUp = (ranked[1]!==undefined && score[ranked[1]]>0) ? ranked[1] : null;
  var secondary=null, best=1;
  (PAIRS[primary]||[]).forEach(function(k){ if(score[k]>best){ best=score[k]; secondary=k; } });

  var strength=null;
  var hasLax = selConcerns.indexOf(5)>=0, hasEls = selConcerns.indexOf(6)>=0;
  var hasSens = caution || selConcerns.indexOf(4)>=0;
  var hasDry = selConcerns.indexOf(1)>=0;
  if(!hasLax && !hasEls) strength='ความหย่อนคล้อยของผิว';
  else if(!hasSens) strength='ความไวหรือการระคายเคืองของผิว';
  else if(!hasDry) strength='ความแห้งขาดน้ำของผิว';

  return { type:primary, primary:primary, secondary:secondary, runnerUp:runnerUp,
           scores:score, isOld:isOld, caution:caution, emphasis:emphasis, budget:budget,
           statusTag:statusTag, prio:prio, selConcerns:selConcerns, strength:strength };
}

  if(r.isOld){ html += '<div class="comeback-note">ลูกค้าเดิม: แพทย์ดูประวัติการดูแลเดิมของคุณประกอบได้</div>'; }

  html += upsellDownsellHTML(r);

  /* ดูตัวเลือกอื่นที่อาจเหมาะ — 3 การ์ดแรก + ที่เหลือพับไว้ */
  var others = ['vitaran','rejuran','nctf','profhilo','nucleofill','plinest','neo']
    .filter(function(k){ return k!==prim; })
    .sort(function(a,b){ return (r.scores[b]-r.scores[a]); });
  html += '<hr class="divider"><div class="sec-head">ดูตัวเลือกอื่นที่อาจเหมาะ</div>';
  html += others.slice(0,3).map(altCardHTML).join('');
  if(others.length>3){
    html += '<div id="moreAlts" class="hidden-alts">'+others.slice(3).map(altCardHTML).join('')+'</div>';
    html += '<button class="toggle-line" onclick="toggleAllAlts(this)">ดูตัวเลือกทั้งหมด</button>';
  }

  /* FAQ / Timeline / Comparison ซ่อนใต้ปุ่มเดียว */
  html += '<button class="toggle-line" onclick="toggleDetails(this)">ดูรายละเอียดเพิ่มเติม</button>';
  html += '<div id="detailsPanel" class="details-panel">'
    +'<div class="expect-block"><div class="h">สิ่งที่ควรรู้ก่อนตัดสินใจ</div>'
    +'<div class="b">'+esc(pd.course)+' · เห็นผลแบบค่อยเป็นค่อยไป · จำนวนครั้งจริงแพทย์ปรับตามสภาพผิว</div></div>'
    + timelineHTML(prim)
    + (r.runnerUp && r.runnerUp!==prim ? ('<div class="sec-head" style="margin-top:12px;">เทียบกับตัวรองอันดับถัดไป</div>'+compareTableHTML(prim, r.runnerUp)) : '')
    + doctorBlockHTML()
    +'<div class="sec-head" style="margin-top:6px;">คำถามที่ถามบ่อย</div>'+faqHTML()
    +'</div>';

  html += '<div class="disclaimer">'+DISCLAIMER+'</div>';
  html += '<div class="reentry"><button class="btn-ghostlink" onclick="restart()">ทำแบบเช็กใหม่</button></div>';
  html += '</div>';

  stage.innerHTML=html; focusTitle();

  var seen=false;
  var anchor=document.getElementById('priceAnchor');
  if(anchor && 'IntersectionObserver' in window){
    var io=new IntersectionObserver(function(es){
      es.forEach(function(e){
        if(e.isIntersecting) seen=true;
        showSticky(seen && !e.isIntersecting && e.boundingClientRect.top<0,
          r.isOld?'ใช้สิทธิ์ลูกค้าเดิมและเช็กคิว':'รับโปรนี้และเช็กคิวว่าง');
      });
    },{threshold:0});
    io.observe(anchor);
  }
}

/* ---------- branch sheet (เลือกสาขาก่อนเปิด LINE) ---------- */
function openBranchSheet(kind, otherKey){
  var body='<div class="handoff-line" style="margin:0 0 6px 0;">เลือกสาขาที่สะดวก แล้วระบบจะเปิด LINE พร้อมข้อความให้ — แค่กดส่ง</div>'
    +'<div class="branch-sheet">'+BRANCHES.map(function(b,i){
      return '<button class="bchip" onclick="chooseBranch('+i+',\''+kind+'\','+(otherKey?('\''+otherKey+'\''):'null')+')">'+b+'</button>';
    }).join('')+'</div>'
    +(CONFIG.SHOW_SLA?('<div class="micro-note" style="margin-top:10px;">'+CONFIG.SLA_TEXT+'</div>'):'');
  openModal({title:'สะดวกสาขาไหน', body:body}, null, null);
}
function chooseBranch(i, kind, otherKey){
  state.branch=i; track('branch_select', basePayload({branch:BRANCHES[i]}));
  var o=document.getElementById('mOverlay'); if(o) o.remove(); document.body.style.overflow='';
  goLine(kind, otherKey);
}
function ctaPrimary(){
  var r=state.result||{};
  track('primary_offer_click', basePayload());
  var c=CONFIG.COMMERCIAL.products[r.primary]; if(c&&c.heroTier===1) track('hero_product_cta_click', basePayload());
  openBranchSheet('book');
}

/* ---------- modals (learn more / compare) ---------- */
var lastFocus=null;
function openModal(innerHTML, trackEv, trackProps){
  lastFocus=document.activeElement;
  var ov=document.createElement('div'); ov.className='m-overlay'; ov.id='mOverlay';
  ov.innerHTML='<div class="m-sheet" role="dialog" aria-modal="true">'
    +'<div class="m-head"><div class="m-title" id="mTitleSlot"></div>'
    +'<button class="m-close" id="mClose" aria-label="ปิด">✕</button></div>'
    +'<div id="mBody"></div></div>';
  document.body.appendChild(ov);
  document.body.style.overflow='hidden';
  document.getElementById('mBody').innerHTML=innerHTML.body;
  document.getElementById('mTitleSlot').textContent=innerHTML.title;
  function close(){ var o=document.getElementById('mOverlay'); if(o) o.remove(); document.body.style.overflow=''; document.removeEventListener('keydown',esch); if(lastFocus&&lastFocus.focus) lastFocus.focus(); }
  function esch(e){ if(e.key==='Escape') close(); }
  document.getElementById('mClose').onclick=close;
  ov.onclick=function(e){ if(e.target===ov) close(); };
  document.addEventListener('keydown',esch);
  document.getElementById('mClose').focus();
  if(trackEv) track(trackEv, trackProps||{});
}
function openLearn(key){
  var pd=P[key], pr=PRICING[key];
  var body=''
    +'<div class="b-row" style="font-size:14px;"><b>ปัญหาที่ตอบโจทย์:</b> '+esc(pd.problem)+'</div>'
    +'<div class="b-row"><b>จุดเด่น:</b> '+esc(pd.benefit)+'</div>'
    +'<div class="b-row"><b>เหมาะกับ:</b> '+esc(pd.bestFor)+'</div>'
    +'<div class="b-row neg"><b>อาจไม่ตรงกับ:</b> '+esc(pd.lessFor)+'</div>'
    +'<div class="b-row"><b>คอร์สโดยทั่วไป:</b> '+esc(pd.course)+'</div>'
    +'<div class="b-row"><b>พักฟื้น:</b> '+esc(pd.downtime)+'</div>'
    +'<div class="b-row"><b>การดูแลต่อเนื่อง:</b> '+esc(pd.maint)+'</div>'
    +'<div class="b-row"><b>สิ่งที่แพทย์จะประเมิน:</b> '+esc(pd.assess)+'</div>'
    + timelineHTML(key)
    +'<div class="b-price" style="margin-top:6px;">โปรโมชั่น '+pr.promo+' <span>(ราคาปกติ '+pr.full+')</span></div>'
    +'<button class="btn btn-primary" style="margin-top:14px;" onclick="track(\'alternate_product_click\',basePayload({target:\''+key+'\',action:\'interest\'}));openBranchSheet(\'alt\',\''+key+'\')">สนใจตัวนี้</button>'
    ;
  openModal({title:pd.name, body:body}, 'browse_learn_more', {product:key});
}
function openCompareModal(key){
  var prim=state.result&&state.result.primary;
  if(!prim||prim===key){ openLearn(key); return; }
  var body='<div class="cmp-intro">'+esc(cmpOneLiner(prim,key))+'</div>'
    + compareTableHTML(prim,key)
    +'<button class="btn btn-primary" style="margin-top:14px;" onclick="track(\'alternate_product_click\',basePayload({target:\''+key+'\',action:\'interest\'}));openBranchSheet(\'alt\',\''+key+'\')">สนใจตัวนี้</button>';
  openModal({title:'เทียบกับผลของฉัน', body:body}, 'compare_open', {pair:prim+'_vs_'+key});
}

/* ---------- LINE handoff ---------- */
function buildLineMessage(kind, otherKey){
  var r=state.result, branch=BRANCHES[state.branch!=null?state.branch:0];
  if(r.type==='doctorOnly'){
    return 'สวัสดีค่ะ ทำ TWC Skin Match แล้ว มีข้อมูลสุขภาพที่อยากให้ทีมช่วยเช็กกับแพทย์ก่อนเลือกโปรแกรมค่ะ\nสาขาที่สะดวก: '+branch+'\nรบกวนทีมช่วยเช็กให้หน่อยนะคะ';
  }
  var pd=P[r.primary], pr=PRICING[r.primary];
  var head = r.isOld ? 'สวัสดีค่ะ เป็นลูกค้าเดิมของทวีชัยคลินิก ทำ TWC Skin Match แล้ว\n' : 'สวัสดีค่ะ ทำ TWC Skin Match แล้ว\n';
  var msg=head+'ผลที่ได้: '+pd.name+'\nโปรโมชั่น: '+pr.promo+'\n';
  if(kind==='alt' && otherKey && otherKey!==r.primary){
    msg+='สนใจเพิ่มเติม: '+P[otherKey].name+' (โปรโมชั่น '+PRICING[otherKey].promo+')\n';
  }
  msg+='สาขาที่สะดวก: '+branch+'\n';
  if(r.caution) msg+='หมายเหตุ: มีผิวไว/ประวัติแพ้ค่ะ\n';
  if(kind==='help') msg+='ยังตัดสินใจไม่ถูก รบกวนช่วยเลือกให้หน่อยค่ะ';
  else if(r.isOld) msg+='ขอใช้สิทธิ์ลูกค้าเดิมและเช็กคิวว่างค่ะ';
  else msg+='สนใจรับโปรนี้ค่ะ ขอเช็กคิวว่างและรายละเอียดการจองได้เลย';
  return msg;
}
function goLine(kind, otherKey){
  var msg=buildLineMessage(kind, otherKey);
  track('line_open', basePayload({kind:kind, target:otherKey||null}));
  if(CONFIG.LINE_OA_ID){
    window.open('https://line.me/R/oaMessage/'+encodeURIComponent(CONFIG.LINE_OA_ID)+'/?'+encodeURIComponent(msg),'_blank');
  } else {
    try{ if(navigator.clipboard) navigator.clipboard.writeText(msg); }catch(e){}
    window.open(CONFIG.LINE_URL,'_blank');
  }
}
function restart(){
  state.qIndex=0; state.answers={}; state.branch=4; state.result=null; track('restart');
  showWelcome(); window.scrollTo(0,0);
}

showWelcome();
</script>
