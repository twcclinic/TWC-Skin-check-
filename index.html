<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>TWC Skin Regeneration Match — Taweechai Clinic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Playfair+Display:ital@1&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --twc-orange:#E8781E;
    --twc-orange-deep:#C85A1E;
    --twc-pink:#E07A9A;
    --twc-pink-tint:#FBEEF1;
    --twc-peach:#FFF3E9;
    --twc-cream:#FFFDFB;
    --twc-ink:#33302E;
    --twc-body:#5B5450;
    --twc-gray:#948C87;
    --twc-line:#EDE0D8;
    --twc-line-soft:#F3E9E2;
    --shadow-soft: 0 10px 30px -14px rgba(80,50,30,0.18);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0; font-family:'Prompt',sans-serif; color:var(--twc-ink);
    background:var(--twc-cream); overflow-x:hidden; -webkit-tap-highlight-color:transparent;
  }

  .app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

  .clinic-header{
    display:flex; align-items:center; gap:12px;
    padding:20px 22px 14px 22px; border-bottom:1px solid var(--twc-line-soft);
  }
  .clinic-logo{ height:40px; width:40px; object-fit:contain; flex-shrink:0; border-radius:8px; }
  .clinic-name{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:16px; line-height:1.3; }
  .clinic-subtitle{ font-family:'Playfair Display',serif; font-style:italic; font-size:12px; color:var(--twc-orange-deep); margin-top:1px; }

  .petal-trail{ display:flex; gap:4px; padding:14px 22px 0 22px; }
  .petal{ flex:1; height:4px; border-radius:3px; background:var(--twc-line-soft); transition:background 0.35s ease; }
  .petal.filled{ background:var(--twc-orange); }
  .petal.current{ background:var(--twc-orange-deep); }

  .stage{ flex:1; display:flex; align-items:center; justify-content:center; padding:22px 22px 34px 22px; }

  .card{
    width:100%; background:#fff; border:1px solid var(--twc-line-soft);
    border-radius:22px 22px 22px 6px; box-shadow:var(--shadow-soft);
    padding:30px 24px 26px 24px; position:relative; animation:rise 0.35s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion: reduce){ .card{animation:none;} .petal{transition:none;} }

  .eyebrow{ font-size:12px; letter-spacing:1.2px; text-transform:uppercase; color:var(--twc-orange-deep); font-weight:600; margin-bottom:10px; }
  h1.title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:24px; line-height:1.45; margin:0 0 12px 0; }
  h1.title.q{ font-size:20px; }
  p.body-text{ font-size:14.5px; line-height:1.75; color:var(--twc-body); margin:0 0 18px 0; font-weight:300; }
  .small-line{ font-size:12.5px; color:var(--twc-gray); margin:-8px 0 20px 0; }

  .btn{
    display:block; width:100%; text-align:center; border:none; cursor:pointer;
    font-family:'Prompt',sans-serif; font-weight:600; font-size:15px;
    padding:15px 18px; border-radius:13px 13px 13px 4px;
    transition: transform 0.12s ease, opacity 0.2s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn[disabled]{ opacity:0.35; pointer-events:none; }
  .btn-primary{
    background:linear-gradient(100deg, var(--twc-orange), var(--twc-orange-deep));
    color:#fff; margin-bottom:10px;
    box-shadow:0 8px 18px -8px rgba(200,90,30,0.5);
  }
  .btn-outline{ background:#fff; color:var(--twc-orange-deep); border:1.3px solid var(--twc-line); margin-bottom:10px; }
  .btn-ghost{ background:transparent; color:var(--twc-gray); font-weight:400; font-size:13px; text-decoration:underline; padding:8px; }
  .secondary-line{ font-size:12.5px; color:var(--twc-gray); text-align:center; margin-top:2px; line-height:1.6; }

  .q-label{ font-size:12px; color:var(--twc-orange-deep); font-weight:600; letter-spacing:0.4px; margin-bottom:8px; }
  .q-sub{ font-size:12.5px; color:var(--twc-gray); margin:-6px 0 6px 0; font-weight:300; }
  .options{ display:flex; flex-direction:column; gap:9px; margin-top:16px; }
  .opt{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; border-radius:12px 12px 12px 4px;
    border:1.3px solid var(--twc-line); background:#fff;
    font-size:14px; font-weight:400; text-align:left; cursor:pointer;
    font-family:'Prompt',sans-serif; color:var(--twc-ink); width:100%; line-height:1.5;
    transition:border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .opt:active{ background:var(--twc-peach); }
  .opt .arrow{ color:var(--twc-orange); font-size:15px; opacity:0.55; flex-shrink:0; }
  .opt.flag{ border-color:#E8C9BE; }
  .opt.selected{ border-color:var(--twc-orange-deep); background:var(--twc-peach); font-weight:500; }
  .opt.dim{ opacity:0.4; }
  .tick{
    width:20px; height:20px; border-radius:6px 6px 6px 2px; flex-shrink:0;
    border:1.3px solid var(--twc-line); display:flex; align-items:center; justify-content:center;
    font-size:12px; color:#fff; transition:background 0.15s ease, border-color 0.15s ease;
  }
  .opt.selected .tick, .consent-box.checked .tick{ background:var(--twc-orange-deep); border-color:var(--twc-orange-deep); }
  .counter{ font-size:12px; color:var(--twc-orange-deep); font-weight:500; text-align:right; margin-top:8px; }

  .back-row{
    display:flex; align-items:center; gap:6px; margin-bottom:16px; font-size:12.5px; color:var(--twc-gray);
    cursor:pointer; width:fit-content; background:none; border:none; font-family:'Prompt',sans-serif; padding:0;
  }

  .consent-box{
    display:flex; gap:11px; align-items:flex-start; padding:14px 15px; border:1.3px solid var(--twc-line);
    border-radius:12px 12px 12px 4px; cursor:pointer; margin:4px 0 16px 0; font-size:13.5px; line-height:1.6;
    font-weight:500; transition:border-color 0.15s ease, background 0.15s ease;
  }
  .consent-box.checked{ border-color:var(--twc-orange-deep); background:var(--twc-peach); }
  .consent-box .tick{ margin-top:1px; }

  .branch-card{
    display:flex; align-items:center; gap:10px; padding:14px 15px; border-radius:12px 12px 12px 4px;
    border:1.3px solid var(--twc-line); margin-bottom:8px; cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .branch-card.selected{ border-color:var(--twc-orange-deep); background:var(--twc-peach); }
  .branch-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; background:var(--twc-orange); }
  .branch-name{ font-weight:500; font-size:14px; }

  /* ===== result ===== */
  .result-badge{
    display:inline-block; padding:5px 14px; border-radius:20px;
    background:linear-gradient(100deg, var(--twc-orange), var(--twc-pink));
    color:#fff; font-size:11.5px; font-weight:600; letter-spacing:0.4px; margin-bottom:14px;
  }
  .pattern-line{ font-size:13px; color:var(--twc-gray); font-weight:300; margin:0 0 4px 0; }
  .profile-title{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:21px; line-height:1.5; margin:0 0 10px 0; }
  .match-line{ font-size:14.5px; color:var(--twc-ink); font-weight:300; margin:0 0 4px 0; line-height:1.6; }
  .match-line b{ font-weight:600; color:var(--twc-orange-deep); }
  .divider{ height:1px; background:var(--twc-line-soft); margin:18px 0; border:none; }
  .sec-head{ font-size:12.5px; font-weight:600; color:var(--twc-orange-deep); letter-spacing:0.3px; margin:0 0 10px 0; }

  .clinical-note{ font-size:13.5px; color:var(--twc-body); line-height:1.8; font-weight:300; margin:0; }

  .reason-list{ margin:0 0 4px 0; padding:0; list-style:none; }
  .reason-list li{ font-size:13px; color:var(--twc-body); line-height:1.75; padding-left:15px; position:relative; font-weight:300; }
  .reason-list li::before{ content:''; position:absolute; left:0; top:9px; width:5px; height:5px; border-radius:50%; background:var(--twc-orange); }

  .prog-card{ border:1.3px solid var(--twc-line); border-radius:16px 16px 16px 6px; padding:16px; margin-bottom:10px; background:#fff; }
  .product-image-frame{
    width:100%; height:136px; border-radius:12px; background:#fff;
    border:1px solid var(--twc-line-soft);
    display:flex; align-items:center; justify-content:center; margin-bottom:12px; overflow:hidden;
  }
  .product-image-frame img{ max-width:84%; max-height:84%; object-fit:contain; }
  .img-placeholder{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:var(--twc-peach); color:var(--twc-gray); font-size:12px; text-align:center; line-height:1.6; padding:10px;
    border-radius:12px; border:1.3px dashed var(--twc-line);
  }
  .prog-name{ font-family:'Noto Serif Thai',serif; font-weight:700; font-size:18px; margin:0 0 3px 0; }
  .prog-cat{
    display:inline-block; font-size:10.5px; color:var(--twc-orange-deep); background:var(--twc-peach);
    padding:3px 9px; border-radius:9px; font-weight:500; margin-bottom:9px;
  }

  .price-area{
    margin-top:11px; padding:14px 15px; border-radius:12px 12px 12px 4px;
    background:var(--twc-peach); border:1px solid #F0DCC8;
  }
  .price-label{ font-size:11.5px; color:var(--twc-orange-deep); font-weight:600; letter-spacing:0.3px; }
  .promo-big{
    font-family:'Noto Serif Thai',serif; font-weight:700; font-size:30px; color:var(--twc-orange-deep);
    line-height:1.25; margin:2px 0 2px 0;
  }
  .price-full-sm{ font-size:12.5px; color:var(--twc-gray); }
  .price-full-sm s{ text-decoration-color:var(--twc-gray); }
  .price-approx{ font-size:11px; color:var(--twc-body); margin-top:7px; line-height:1.6; font-weight:300; }

  .variant-strip{ display:flex; gap:8px; margin:12px 0 4px 0; }
  .variant-item{ flex:1; text-align:center; }
  .variant-thumb{
    width:100%; height:52px; border-radius:8px; background:#fff; border:1px solid var(--twc-line-soft);
    display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:4px;
  }
  .variant-thumb img{ max-width:88%; max-height:88%; object-fit:contain; }
  .variant-label{ font-size:10px; color:var(--twc-gray); line-height:1.3; }
  .variant-caption{ font-size:11px; color:var(--twc-body); line-height:1.6; margin:6px 0 2px 0; font-weight:300; }

  .detail-toggle{
    background:none; border:none; font-family:'Prompt',sans-serif; cursor:pointer;
    font-size:12.5px; color:var(--twc-orange-deep); font-weight:500; padding:10px 0 2px 0; text-decoration:underline;
  }
  .detail-panel{ display:none; padding:6px 0 0 0; }
  .detail-panel.open{ display:block; }
  .detail-panel p{ font-size:12.5px; color:var(--twc-body); line-height:1.75; font-weight:300; margin:0 0 6px 0; }
  .detail-panel ul{ margin:0; padding:0; list-style:none; }
  .detail-panel li{ font-size:12.5px; color:var(--twc-body); line-height:1.7; padding-left:15px; position:relative; font-weight:300; }
  .detail-panel li::before{ content:''; position:absolute; left:0; top:8px; width:5px; height:5px; border-radius:50%; background:var(--twc-pink); }

  .prog-card.secondary{
    padding:13px 14px; border-color:var(--twc-line-soft); background:var(--twc-peach);
    display:flex; gap:12px; align-items:flex-start;
  }
  .sec-thumb{
    width:64px; height:64px; flex-shrink:0; border-radius:9px; background:#fff;
    border:1px solid var(--twc-line-soft);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .sec-thumb img{ max-width:86%; max-height:86%; object-fit:contain; }
  .sec-thumb .ph{ font-size:9px; color:var(--twc-gray); text-align:center; padding:4px; line-height:1.4; }
  .prog-card.secondary .prog-name{ font-size:14.5px; }
  .sec-fit{ font-size:12px; color:var(--twc-body); line-height:1.6; font-weight:300; }
  .sec-price{ font-size:12px; color:var(--twc-orange-deep); font-weight:600; margin-top:5px; }
  .sec-price span{ font-size:11px; color:var(--twc-gray); font-weight:400; }

  .caution-note{
    font-size:12.5px; color:#8A5A2A; line-height:1.75; font-weight:300;
    padding:13px 15px; background:#FFF6EC; border:1px solid #F0DCC0;
    border-radius:12px 12px 12px 4px; margin:14px 0 4px 0;
  }
  .doctor-note{
    font-size:12.5px; color:var(--twc-body); line-height:1.75; font-weight:300;
    padding:13px 15px; background:var(--twc-peach); border-radius:12px 12px 12px 4px; margin:16px 0 6px 0;
  }
  .comeback-note{
    font-size:12.5px; color:var(--twc-orange-deep); line-height:1.7; font-weight:400;
    padding:12px 14px; border:1px dashed #F0D9C4; border-radius:12px 12px 12px 4px; margin:14px 0 4px 0;
  }
  .disclaimer{ font-size:11px; color:var(--twc-gray); line-height:1.7; margin-top:16px; }
  .reassure{ font-size:12px; color:var(--twc-gray); text-align:center; margin-top:14px; line-height:1.7; }

  ::selection{ background:var(--twc-peach); }
  button:focus-visible, .opt:focus-visible, .branch-card:focus-visible, .consent-box:focus-visible{
    outline:2px solid var(--twc-orange-deep); outline-offset:2px;
  }

  /* ===== ดูโปรแกรมอื่นที่เกี่ยวข้อง ===== */
  .other-programs{ margin-top:22px; border-top:1px solid var(--twc-line); padding-top:18px; }
  .toggle-other-programs{
    width:100%; display:flex; align-items:center; justify-content:space-between;
    border:1px solid rgba(232,120,30,0.28); background:#FFFAF6; color:var(--twc-orange-deep);
    border-radius:16px 16px 16px 5px; padding:14px 16px; cursor:pointer;
    font-family:'Prompt',sans-serif; font-weight:600; font-size:14px;
  }
  .other-chevron{ font-size:18px; transition:transform 0.25s ease; }
  .other-programs-panel{ overflow:hidden; }
  .other-programs-panel.collapsed{ max-height:0; opacity:0; pointer-events:none; margin:0; }
  .other-programs-panel:not(.collapsed){ max-height:none; opacity:1; margin-top:12px; animation:rise 0.3s ease; }
  .section-note{ font-size:12.5px; color:var(--twc-body); line-height:1.7; font-weight:300; margin:0 0 6px 0; }

  .other-program-card{
    border:1px solid var(--twc-line); border-radius:18px 18px 18px 6px; background:#fff;
    padding:15px; margin-top:12px;
  }
  .other-problem-headline{
    font-family:'Noto Serif Thai',serif; font-size:16px; font-weight:700;
    color:var(--twc-ink); line-height:1.45;
  }
  .other-product-desc{ font-size:13px; line-height:1.7; color:var(--twc-body); margin-top:7px; font-weight:300; }
  .other-name-row{ display:flex; align-items:center; gap:11px; margin-top:11px; }
  .other-thumb{
    width:56px; height:56px; flex-shrink:0; border-radius:9px; background:#fff;
    border:1px solid var(--twc-line-soft); display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .other-thumb img{ max-width:86%; max-height:86%; object-fit:contain; }
  .other-thumb .ph{ font-size:8.5px; color:var(--twc-gray); text-align:center; padding:3px; line-height:1.35; }
  .other-product-name{ font-size:14px; font-weight:600; color:var(--twc-orange-deep); }
  .other-bestfor{ font-size:11.5px; color:var(--twc-gray); margin-top:2px; line-height:1.5; }
  .other-price{ margin-top:11px; display:flex; align-items:baseline; flex-wrap:wrap; gap:8px; }
  .other-price-label{ font-size:11px; color:var(--twc-orange-deep); font-weight:600; width:100%; }
  .other-price .promo{ font-family:'Noto Serif Thai',serif; font-size:22px; font-weight:700; color:var(--twc-orange-deep); }
  .other-price .full{ font-size:12px; color:var(--twc-gray); }
  .other-card-actions{ display:flex; gap:8px; margin-top:13px; }
  .other-card-actions button{
    flex:1; border-radius:11px 11px 11px 3px; padding:11px 8px; font-family:'Prompt',sans-serif;
    font-weight:500; font-size:12.5px; cursor:pointer; transition:transform 0.12s ease;
  }
  .other-card-actions button:active{ transform:scale(0.97); }
  .other-btn-read{ background:#fff; color:var(--twc-orange-deep); border:1.2px solid var(--twc-line); }
  .other-btn-line{ background:var(--twc-orange-deep); color:#fff; border:none; }
  .other-more-hidden{ display:none; }
  .other-more-btn{
    width:100%; margin-top:12px; background:transparent; border:1px dashed rgba(232,120,30,0.4);
    color:var(--twc-orange-deep); border-radius:12px; padding:11px; cursor:pointer;
    font-family:'Prompt',sans-serif; font-weight:500; font-size:13px;
  }

  /* ===== product detail modal ===== */
  .pd-overlay{
    position:fixed; inset:0; background:rgba(51,48,46,0.5); z-index:100;
    display:flex; align-items:flex-end; justify-content:center; padding:0; animation:fade 0.2s ease;
  }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }
  .pd-modal{
    width:100%; max-width:480px; background:#fff; border-radius:22px 22px 0 0;
    padding:22px 22px 28px 22px; position:relative; max-height:88vh; overflow-y:auto;
    animation:slideup 0.28s ease;
  }
  @keyframes slideup{ from{transform:translateY(30px);} to{transform:translateY(0);} }
  .pd-close{
    position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:50%;
    border:1px solid var(--twc-line); background:#fff; color:var(--twc-body); cursor:pointer; font-size:14px;
  }
  .pd-thumb{
    width:96px; height:96px; border-radius:12px; background:#fff; border:1px solid var(--twc-line-soft);
    display:flex; align-items:center; justify-content:center; overflow:hidden; margin:6px 0 14px 0;
  }
  .pd-thumb img{ max-width:86%; max-height:86%; object-fit:contain; }
  .pd-thumb .ph{ font-size:10px; color:var(--twc-gray); text-align:center; padding:6px; line-height:1.4; }
  .pd-headline{ font-family:'Noto Serif Thai',serif; font-size:18px; font-weight:700; color:var(--twc-ink); line-height:1.45; }
  .pd-name{ font-size:13px; font-weight:600; color:var(--twc-orange-deep); margin-top:6px; }
  .pd-block{ margin-top:14px; }
  .pd-block-label{ font-size:11.5px; font-weight:600; color:var(--twc-orange-deep); letter-spacing:0.3px; }
  .pd-block-text{ font-size:13px; color:var(--twc-body); line-height:1.7; font-weight:300; margin-top:4px; }
  .pd-price{ margin-top:16px; padding:13px 15px; background:var(--twc-peach); border:1px solid #F0DCC8; border-radius:12px 12px 12px 4px; display:flex; align-items:baseline; flex-wrap:wrap; gap:8px; }
  .pd-price .promo{ font-family:'Noto Serif Thai',serif; font-size:24px; font-weight:700; color:var(--twc-orange-deep); }
  .pd-price .full{ font-size:12px; color:var(--twc-gray); }
  .pd-disclaimer{ font-size:10.5px; color:var(--twc-gray); line-height:1.7; margin-top:14px; }
</style>
</head>
<body>

}

function toggleMulti(i){
  const q = QUESTIONS[state.qIndex];
  let sel = state.answers[q.id] || [];
  if(sel.indexOf(i)>=0) sel = sel.filter(function(x){return x!==i;});
  else if(sel.length < q.max) sel = sel.concat([i]);
  state.answers[q.id]=sel; showQuestion();
}
function pickSingle(i){ state.answers[QUESTIONS[state.qIndex].id]=i; nextQuestion(); }
function nextQuestion(){
  if(state.qIndex < QUESTIONS.length-1){ state.qIndex++; showQuestion(); } else { showBranch(); }

/* calculateResult — skin-fit เท่านั้น */
function calculateResult(){
  const score = { neo:0, nctf:0, vitaran:0, rejuran:0, nucleofill:0, plinest:0, profhilo:0 };
  let hard=false, caution=false, emphasis=false, isOld=false, ageIdx=null;
  const phrases=[], concernProducts={};

  QUESTIONS.forEach(function(q){
    const a = state.answers[q.id];
    if(a===undefined) return;
    const idxs = Array.isArray(a)?a:[a];
    idxs.forEach(function(i){
      const o = q.options[i];
      if(o.hard) hard=true;
      if(o.caution) caution=true;
      if(o.emphasis) emphasis=true;
      if(o.tag==='OLD') isOld=true;
      if(o.age!==undefined) ageIdx=o.age;
      if(o.phrase){ phrases.push({ text:o.phrase, w:o.w||{} }); }
      Object.keys(o.w||{}).forEach(function(k){ score[k]+=o.w[k]; concernProducts[k]=true; });
    });
  });

  if(hard) return { type:'doctorOnly', isOld:isOld, caution:caution };

  if(ageIdx===0){ ['nucleofill','plinest','profhilo'].forEach(function(k){ score[k]=Math.max(0, score[k]-2); }); }

  const order = ['vitaran','rejuran','nctf','profhilo','nucleofill','plinest','neo'];
  const ranked = order.slice().sort(function(a,b){ return score[b]-score[a] || order.indexOf(a)-order.indexOf(b); });
  const primary = ranked[0];

  if(score[primary] <= 2) return { type:'doctorOnly', isOld:isOld, caution:caution, soft:true };

  let secondary=null, best=-1;
  (PAIRS[primary]||[]).forEach(function(k){ if(score[k]>best){ best=score[k]; secondary=k; } });
  if(secondary){
    const close = (score[primary]-best) <= 2;
    const diffConcern = concernProducts[secondary] === true;
    if(!(best>=2 && (close || diffConcern))) secondary=null;
  }

  const primaryPhrases = phrases.filter(function(p){ return p.w && p.w[primary]; }).map(function(p){ return p.text; });
  const uniq = primaryPhrases.filter(function(t,i){ return primaryPhrases.indexOf(t)===i; });
  const pattern = uniq.length ? uniq.slice(0,2).join(' และ ') : RESULTS[primary].title;
  const reasons = uniq.slice(0,2).map(function(t){ return 'คุณเลือกปัญหา “'+t+'” ซึ่งตรงกับแนวทางของโปรแกรมนี้'; });
  reasons.push(RESULTS[primary].body);

  return { type:primary, primary:primary, secondary:secondary, isOld:isOld,
           caution:caution, emphasis:emphasis, pattern:pattern, reasons:reasons, scores:score };
}

/* =========================================================
   OTHER PROGRAMS — ดูโปรแกรมอื่นที่เกี่ยวข้อง (ปัญหานำหน้า)
   อยู่ท้ายสุดของผล ไม่แข่งกับตัวหลัก collapse โดยดีฟอลต์
   ========================================================= */
function sortOtherProgramsByRelevance(remaining, scores){
  const hasSignal = remaining.some(function(k){ return scores && (scores[k]||0) > 0; });
  if(!hasSignal) return remaining.slice();
  return remaining.slice().sort(function(a,b){
    return (scores[b]||0)-(scores[a]||0) || PRODUCT_ORDER.indexOf(a)-PRODUCT_ORDER.indexOf(b);
  });
}

function renderOtherPrograms(primaryKey, secondaryKey, scores){
  const excluded = {};
  if(primaryKey) excluded[primaryKey]=true;
  if(secondaryKey) excluded[secondaryKey]=true;
  const remaining = PRODUCT_ORDER.filter(function(k){ return !excluded[k]; });
  const sorted = sortOtherProgramsByRelevance(remaining, scores);

  const firstFive = sorted.slice(0,5);
  const rest = sorted.slice(5);
  let cards = firstFive.map(renderOtherProgramCard).join('');
  if(rest.length){
    cards += '<div id="otherProgramsMore" class="other-more-hidden">'
      + rest.map(renderOtherProgramCard).join('') + '</div>'
      + '<button class="other-more-btn" onclick="revealMoreOther()">ดูเพิ่มเติม</button>';
  }

  return '<section class="other-programs">'
    +'<button class="toggle-other-programs" onclick="toggleOtherPrograms()" aria-expanded="false" id="otherToggle">'
    +'<span>ดูโปรแกรมอื่นที่เกี่ยวข้อง</span><span class="other-chevron" id="otherChevron">›</span></button>'
    +'<div id="otherProgramsPanel" class="other-programs-panel collapsed">'
    +'<p class="section-note">หากคุณมีปัญหาผิวด้านอื่นร่วมด้วย สามารถอ่านแนวทางเพิ่มเติมก่อนให้แพทย์ประเมินได้</p>'
    + cards
    +'</div></section>';
}

  closeProductDetail();
  const r = state.result;
  const primaryName = (r && r.primary) ? PRODUCTS[r.primary].name : 'ผลประเมินเบื้องต้น';
  const other = PRODUCTS[key], c = OTHER_PROGRAM_COPY[key];
  const msg = 'สวัสดีค่ะ ฉันทำแบบประเมิน TWC Skin Regeneration Match แล้ว\n'
    + 'ผลประเมินหลักของฉันคือ: '+primaryName+'\n'
    + 'แต่ต้องการสอบถามเพิ่มเติมเกี่ยวกับ: '+other.name+'\n'
    + 'เพราะมีปัญหา “'+c.headline+'” ร่วมด้วย\n'
    + 'รบกวนให้ทีมช่วยประเมินเบื้องต้นค่ะ';
  if(CONFIG.LINE_OA_ID){
    window.open('https://line.me/R/oaMessage/'+encodeURIComponent(CONFIG.LINE_OA_ID)+'/?'+encodeURIComponent(msg), '_blank');
  } else {
    try{ if(navigator.clipboard) navigator.clipboard.writeText(msg);}catch(e){}
    window.open(CONFIG.LINE_URL, '_blank');
  }
}

function showThink(){
  stage.innerHTML =
  '<div class="card">'
  +'<div class="eyebrow">ไม่ต้องรีบตัดสินใจ</div>'
  +'<h1 class="title q">เก็บผลไว้อ่านก่อนก็ได้ค่ะ</h1>'
  +'<p class="body-text">ผลประเมินนี้เป็นของคุณ หากต้องการเก็บไว้พิจารณาก่อน ให้ทีมส่งสรุปเข้าไลน์ไว้ได้โดยยังไม่ต้องนัดหมายใด ๆ</p>'
  +'<button class="btn btn-outline" onclick="ctaLine(\'think\')">ส่งสรุปเก็บไว้ในไลน์</button>'
  +'<button class="btn btn-ghost" onclick="renderResult()">กลับไปดูผลประเมิน</button>'
  +'</div>';
}

function buildLineMessage(clickType){
  const r = state.result, branch = BRANCHES[state.branch].name;
  if(r.type==='doctorOnly'){
    return 'สวัสดีค่ะ ฉันทำแบบประเมิน TWC Skin Regeneration Match แล้ว ระบบแนะนำให้แพทย์ประเมินก่อนเลือกโปรแกรม เนื่องจากมีข้อมูลที่ควรตรวจสอบเพิ่มเติม ต้องการจองประเมินผิวค่ะ (สาขาที่สะดวก: '+branch+')';
  }
  const prim = PRODUCTS[r.primary], price = PRICING[r.primary];
  let msg = 'สวัสดีค่ะ ฉันทำแบบประเมิน TWC Skin Regeneration Match แล้ว\n';
  msg += 'ระบบอ่านปัญหาผิวหลักได้ว่า: '+r.pattern+'\n';
  msg += 'ตัวเลือกหลักที่เข้ากับผิว: '+prim.name+' (ราคาโปรโมชั่น '+price.promo+' / ราคาเต็ม '+price.full+')\n';
  if(r.secondary) msg += 'ตัวเลือกเพิ่มเติมที่แพทย์อาจพิจารณา: '+PRODUCTS[r.secondary].name+'\n';
  msg += 'สาขาที่สะดวก: '+branch+'\n';
  if(r.caution) msg += 'หมายเหตุ: มีผิวไว/ประวัติแพ้ ต้องการให้แพทย์ประเมินก่อนค่ะ\n';
  msg += ({ book:'ต้องการจองประเมินผิวกับแพทย์ค่ะ',
            details:'ต้องการให้ทีมส่งรายละเอียดเพิ่มเติมค่ะ',
            think:'ขอเก็บผลไว้พิจารณาก่อน ยังไม่ตัดสินใจตอนนี้ค่ะ' }[clickType] || 'ต้องการให้ทีมส่งรายละเอียดเพิ่มเติมค่ะ');
  return msg;
}
function ctaLine(type){
  const msg = buildLineMessage(type);
  if(CONFIG.LINE_OA_ID){
    window.open('https://line.me/R/oaMessage/'+encodeURIComponent(CONFIG.LINE_OA_ID)+'/?'+encodeURIComponent(msg), '_blank');
  } else {
    try{ if(navigator.clipboard) navigator.clipboard.writeText(msg);}catch(e){}
    alert('คัดลอกข้อความสรุปให้แล้ว — เปิดไลน์แล้ววางส่งได้เลยค่ะ');
    window.open(CONFIG.LINE_URL, '_blank');
  }
}

function restart(){ state.qIndex=0; state.answers={}; state.branch=4; state.result=null; showWelcome(); }

showWelcome();
</script>
